body:
  text: 七政推步卷一明貝琳編釋用數例周天計十二宮共三百六十度每一宮三十度每一度六十分每一分六十秒每一秒六十微每一微六十纖釋囘囘厯法積年西域阿刺必年開皇己未為元至洪武甲子積七百八十六算釋宮分日數白羊戌宮三十一日金牛酉宮三十一日陰陽申宮三十一日巨蟹未宮三十二日獅子午宮三十一日雙女巳宮三十一日天秤辰宮三十日天蝎卯宮三十日人馬寅宮二十九日磨羯丑宮二十九日寳瓶子宮三十日雙魚亥宮三十日已上十二宮即囘囘厯書所謂不動的月者是也共三百六十五日乃歲周之日也若遇宮分有閏之年於雙魚亥宮之三十日内又添一日其年周歲得三百六十六日也釋月分大小及本音名號第一月大名法而斡而丁第二月小名阿而的必喜世第三月大名虎而達第四月小名提而第五月大名木而達第六月小名沙合列斡而第七月大名列黑而第八月小名阿斑第九月大名阿咱而第十月小名答亦第十一月大名八哈慢第十二月小名亦思番達而麻的已上十二月即囘囘厯書所謂動的月者是也大月三十日小月二十九日共三百五十四日乃十二月之日也若遇月分有閏之年於第十二月内又添一日為大月其十二月得三百五十五日也釋七曜數及本音名號日一數名也閃别月二數名都閃别火三數名寫閃别水四數名察兒閃别木五數名盤閃别金六數名阿的那土七數名闕閃别釋閏法求宮分閏日西域歲前積年即開皇己未為元法曰置西域歲前積年減一用之以一百五十九乘之内加一十五以一百二十八除之餘不滿法之數若在九十六之上其年宮分有閏日若在九十六之下其年宮分無閏日所除滿法之數内加五滿七除之餘數即所求年白羊宮一日七曜也求月分閏日法曰置西域歲前積年減一用之以一百三十一乘之内加一百九十四共得滿三十除之餘不滿法之數若在十八已上其年月分有閏日若在十八已下其年月分無閏日將滿法除得之數滿七已上去之不盡之數即所求年第一月一日七曜也凡算閏日者有宮分内閏日有月分内閏日若算得宮分内有閏日者於雙魚亥宮内添一日為三十一日月分内不添若算得月分内有閏日者於第十二月内添一日為大月宮分内却不添如宮分月分内俱算得有閏日若宮分内月分内各添一日是也求中國閏月至元甲子至洪武甲子計積一百二十一算法曰距至元甲子歲為元至所求年内減一算却加一百三十七以一百二十三乘之又加一十以三百三十四除之得數寄左其除不盡之數若在二百一十一已上其年中國有閏月已下其年中國無閏月若在已上者與三百三十四相減餘以四乘之又以四十一除之得數即為所求年中國閏月也假令除得一數是正月二數是二月餘倣此當時測定太陽五星最高行度太陽二宮二十九度二十一分土星八宮十四度四十八分木星六宮初度八分火星四宮十五度四分金星二宮十七度六分水星七宮六度十七分七政經緯度法太陽行度求最高總度西域歲前積年至洪武甲子歲積七百八十六算内減一算為全年法曰置西域歲前積年即係全年入總年零年月日立成内各取最高行度併之假令零年是十年者去九年内取月分日數倣此共得即為所求最高總度也求最高行度法曰置求到最高總度内加測定太陽最高行度二宮二十九度二十一分共得為所求年白羊宫最高行度也如求次宮者累加五秒為各宮最高行度也求中心行度法曰置西域歲前積年即係全年入總年零年月日立成内各取日中心行度併之共得内減一分四秒即所求年白羊宮一日中心行度也内加九度五十一分二十三秒為各宮内第十一日中心行度也内加一十九度四十二分四十七秒為二十一日中心行度也求各宮中心行度法曰置求到白羊宮一日中心行度内加日躔十二宮立成各宮下日中行度即為各宮中心行度也求自行度法曰置其日中心行度内減其宮最高行度即為所求自行度也求加減差法曰視自行度宮度入太陽立成宮度内取加減分乘其自行度分已下小餘得數滿六十約之為加減定分却視本行加減差少如後行者以加減定分加之多如後行者以加減定分減之為加減定差如自行度在初宮至五宮為減差在六宮至十一宮為加差即為所求加減差也求經度法曰置其日中心行度以加減差加減之即為所求經度也逐日細行度與土星木星細行度同法太陰經度求七曜如求太陽五星羅計七曜者並依此法求之即得各曜所求七曜也法曰置西域歲前積年即係全年入立成内取總年零年月日下七曜數併之共得滿七已上去之即為所求年白羊宮一日七曜也如求次宮者内加各宮七曜數如求逐日者累添一數滿七已上去之即得所求也求中心行度晝夜行十三度一十分三十五秒法曰置西域歲前積年即係全年入立成内各取總年零年月日下中心行度併之共得内減一十四分即為所求年白羊宮一日中心行度也如求次日者累加中心行度十三度一十一分即得所求求加倍相離度晝夜行二十四度二十二分五十三秒二十二微法曰置西域歲前積年即係全年入立成内各取總年零年月日下加倍相離度併之共得内減二十六分即為所求年白羊宮一日加倍相離度也如求次日者累加加倍相離度二十四度二十三分即得所求求本輪行度晝夜行十三度三分五十四秒法曰置西域歲前積年即係全年入立成内各取總年零年月日下本輪行度併之共得内減一十四分即為所求年白羊宮一日本輪行度也如求次日者累加本輪心行度一十三度四分即得所求求第一加減差法曰視加倍相離度其宮度入太陰第一加減立成内宮内度下兩取之得其度分為未定差其分已下小餘以本行加減分乘之滿六十約之為分視加減差少如後一行者加之多如後一行者減之用加減兩取到未定差即為所求第一加減差也視加倍相離度在初宮至五宮為加差六宮至十一宮為減差求本輪行定度法曰置求到本輪行度以第一加減差加減之即為所求本輪行定度也視加倍相離度在初宮至五宮為加差六宮至十一宮為減差求第二加減差法曰視本輪行定度其宮度入太陰第二加減立成内宮内度下兩取之得其度分為未定差其分已下小餘以本行下加減分乘之滿六十約之為分視加減差少如後行者加之多如後行者減之用加減兩取到未定差即為所求第二加減差也視本輪行定度初宮至五宮為減差六宮至十一宮為加差求比敷分法曰視加倍相離度宮度入太陰第一加減立成内宮内度下兩取之即為所求比敷分也如加倍相離度零分在三十分已上者取後一行比敷分求遠近度法曰視本輪行定度其宮度入太陰第二加減立成内宮内度下兩取之得數又本行與後行相減餘以乘本輪行定度小餘滿六十約之為分用加減兩取遠近度視遠近度少如後行者加之多如後行者減之得數即為所求遠近度也求汎差法曰置比敷分以遠近度通分乘之得數滿六十約之為分即為所求汎差也求加減定差法曰置第二加減差内加汎差共得即為所求加減定差也視本輪行定度初宮至五宮為減差六宮至十一宮為加差求太陰經度法曰置其日太陰中心行度以加減定差加減之得數言加者加之言減者減之即為所求太陰經度也五星經度求最高總度法曰依太陽術求之即為所求最高總度也求最高行度法曰置求到各星最高總度内加測定各星最高行度共得即為所求年白羊宮最高行度也如求次宮者累加五秒即得各宮最高行度也求日中行度亦名中心行度法曰依太陽術求之即為所求日中行度如求次宮者内加各宮日中行度求十日者加十日日中行度自然吻合也求自行度法曰置西域歲前積年即係全年入立成内總年零年月日下各取自行度併之共得即為所求年白羊宮一日自行度也土木金三星減一分水星減三分火星不減如求次宮者内加各宮自行度求十日者内加十日自行度自然吻合也水星如自行度遇三宮初度作五日一叚算至九宮初度作十日一叚算緯度亦然求小輪心度法曰土木火三星置太陽中心行度内減其星自行度為土木火三星中心行度内又減最高行度為其星小輪心度也金水二星置太陽中心行度即其星中心行度也内減其星最高行度餘為金水二星小輪心度也如求次宮并十日二十日者並依前法求之也求第一加減差法曰視其星小輪心度其宮度入各星第一加減立成内宮内度下兩取之得其度分為未定差其分已下小餘以本行下加減分乘之滿六十約之為分視加減差少如後行者加之多如後行者減之用加減兩取到未定差即為所求第一加減差也求自行定度及小輪心定度法曰視其星小輪心度在初宮至五宮以第一加減差加自行度減小輪心度為定度在六宮至十一宮以第一加減差減自行度加小輪心度為定度即各得所求求第二加減差法曰視其星自行定度其宮度入各星第二加減立成内宮内度下兩取之得其度分為未定差其分已下小餘以本行加減分乘之滿六十約之為分視加減差少如後行者加之多如後行者減之用加減兩取到未定差即為所求第二加減差也求比敷分法曰視小輪心定度其宮度入第一加減立成内宮内度下兩取之即得為土木金水四星比敷分如小輪心定度小餘分在三十已上者取後行比敷分用之火星以兩取到比敷分與後行相減餘以乘小輪心定度小餘滿六十約之為秒視比敷分少如後行者加之多如後行者減之用加減兩取到比敷分即為所求比敷分也求遠近度法曰視自行定度其宮度入第二加減立成内宮内度下兩取遠近度又本行與後行相減餘以乘自行定度小餘滿六十約之為分視遠近度少如後行者加之多如後行者減之用加減兩取到遠近度即為所求遠近度也求汎差法曰置比敷分以遠近度通分乘之得數滿六十約之為度分即為所求汎差也求加減定差法曰置第二加減差内加汎差共得視自行定度在初宮至五宮為加差六宮至十一宮為減差即為所求加減定差也求五星經度法曰置小輪心定度以加減定差加減之内加各星最高行度共得即為所求五星經度也求五星留退叚土星留七日其留日前三日後三日皆與留日數同木星留五日其留日前二日後二日皆與留日數同火金水三星不留退而即行行而即退法曰視其留叚小輪心定度其宮度入五星順退留立成内宮内度下兩取各星下宮度分本行與前後二行相減若取得在初宮至六宮本行與後行相減六宮至初宮本行與前行相減餘為法又置其日小輪心定度内減立成内小輪心定度餘為實通分以法乘之用六度除之滿六十約之為分視兩取各星下宮度分順行者加之退行者減之用加減兩取到各星下宮度分得數與其日自行定度同者即本日留如自行定度多者已過留日少者未到留日以兩取到各星下加減所得宮度分與自行定度相減餘以立成内各星一日下自行度約之即得留日在本日前後日數也求留日自行度法曰置其日自行度如留在前者減留在後者加視前後幾日以立成内各星自行度加減之即得所求求留日小輪心度法曰金水二星置其日小輪心度視留在前後幾日以立成内日中行度分加減之留在前者減留在後者加即得所求土木火三星視留在前後幾日以立成内三星自行度去減立成内日中行度分餘加減其日小輪心度留在前者減留在後者加即得所求求五