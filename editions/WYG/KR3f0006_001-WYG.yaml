所求交食辨日食限法曰若合朔在晝者視太陰緯度在黃道南四十五分已下為有食在黃道北九十分已下者為有食又合朔在日未出三時者係西域時視太陰緯度在黃道南四十五分已下黃道北九十分已下為有食又合朔在日入一十五分者一時六十分一十五分即四分時之一也視太陰緯度在黃道南四十五分已下黃道北九十分已下亦為有食辨月食限法曰視朢日太陰經度與羅㬋或計都度相離一十三度之内為有食又視朢日太陰緯度在一度八分之下為有食又法視朢日太陰未出二時或未入二時與太陽相朢者其限有帶食用算在未出或未入二時已上者即在晝也不用算推日食法午正太陽度午正太陰行過太陽度午正太陰經度午正太陽中心行度午正太陰緯度黃道南北午正太陽自行度午正計都度午正太陰本輪行度太陽日行度太陰日行度求食甚泛時視其日午前合朔用前一日諸數推之午後合朔用次日諸數推之法曰置午正太陰行過太陽度通秒以二十四乘之得數為實又置太陰日行度内減太陽日行度餘通秒得數為法置實滿法除之為時其時下零數以六十通之為分分下零數以六十通之為秒滿三十秒已上収為一分滿六十分収為一時共得數即為所求食甚泛時也求合朔時太陽度法曰置食甚泛時通分得數以太陽日行度通秒乘之得數以二十四除之為㣲滿六十約之為分秒用加減午正太陽度午前合朔減之午後合朔加之餘即為所求合朔時太陽度即食甚日躔黃道宮度分求加減分法曰視合朔時太陽度其宮度入晝夜加減立成内橫取加減分為未定加減分以本行加減分與後一行加減分相減餘以乘其合朔時太陽度小餘得數為纖滿六十約之為㣲又約之為秒去加減横取到未定加減分少如後行者加之多如後行者減之得為所求加減分也求子正至合朔時分秒法曰置食甚泛時内加減前求到加減分午前合朔減午後合朔加餘數加減一十二時得即為所求子正至合朔時分秒也午前合朔用減十二時午後合朔用加十二時求第一東西差法曰視合朔時太陽度在某宮若在右七宮取上行時若在左七宮取下行時橫推太陽某宮視子正至合朔時某時内兩取經差為未定差又取次一時經差與未定差相減餘通秒寄左又置子正至合朔時小餘亦通秒得數與寄左相乘得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減兩取到未定經差如次一時經差少者減之如次一時經差多者加之即為所求第一東西差也求第二東西差法曰視合朔時太陽度在某宮又推取次一宮又視子正至合朔時某時内兩取經差為未定差又取次一時内經差與未定差相減餘通秒寄左又置子正至合朔時小餘亦通秒與寄左相乘得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減兩取到未定經差如次一時經差少者減之如次一時經差多者加之即為所求第二東西差也求第一南北差法曰視合朔時太陽度在某宮又視子正至合朔時在某時内兩取緯差為未定差又取次一時内緯差與未定差相減餘通秒寄左又置子正至合朔時小餘亦通秒與寄左相乘得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減兩取到未定緯差如次一時緯差少者減之如次一時緯差多者加之即得所求第一南北差也求第二南北差法曰視合朔時太陽度在某宮又推取次一宮又視子正至合朔時某時内兩取緯差為未定差又取次一時内緯差與未定差相減餘通秒寄左又置子正至合朔時小餘亦通秒與寄左相乘得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減兩取到未定緯差如次一時緯差少者減之如次一時緯差多者加之即為所求第二南北差也求第一時差法曰視合朔時太陽度在某宮又視子正至合朔時在某時内兩取時差為未定差又取次一時内時差與未定差相減所餘分寄左又置子正至合朔時小餘分通秒與寄左相乘得數為㣲滿六十約之為秒又以六十約之為分去加減兩取到未定時差如次一時時差少者減之如次一時時差多者加之即為所求第一時差也求第二時差法曰視合朔時太陽度在某宮又推取次一宮又視子正至合朔時在某時内兩取時差為未定差又取次一時内時差與未定差相減所餘分寄左又置子正至合朔時小餘分通秒與寄左相乘得數為㣲滿六十約之為秒又以六十約之為分去加減兩取到未定時差如次一時時差少者減之如次一時時差多者加之即為所求第二時差也求合朔時東西差法曰置第一東西差與第二東西差相減餘通秒寄左又置合朔時太陽度分通秒與寄左相乘以三十度除之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減第一東西差視第一東西差多如第二東西差者減之少如第二東西差者加之即為所求合朔時東西差也求合朔時南北差法曰置第二南北差與第一南北差相減餘通秒寄左又置合朔時太陽度分通秒與寄左相乘以三十度除之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減第一南北差視第一南北差多如第二南北差者減之少如第二南北差者加之即為所求合朔時南北差也求合朔時時差法曰置第一時差與第二時差相減餘通秒寄左又置合朔時太陽度分通秒與寄左相乘以三十度除之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分去加減第一時差視第一時差多如第二時差者減之少如第二時差者加之即為所求合朔時時差也求合朔時本輪行度法曰置太陰本輪行度一十三度四分即立成内一日下本輪行度也通分以食甚泛時亦通分乘之得數以二十四除之為秒滿六十約之為分又以六十約之為度去加減其日午正本輪行度午前合朔減之午後合朔加之即為合朔時本輪行度也求比敷分法曰視合朔時本輪行度入立成宮度内橫取其比敷分為未定分又與次一行比敷分相減餘為法又置合朔時本輪行度内減立成内橫推宮度餘通分以法乘之得數為㣲以六度除之滿六十約之為秒用加減橫取到未定比敷分視次行比敷分少者減之多者加之即為所求比敷分也求東西定差法曰置求到合朔時東西差通秒為實以求到比敷分亦通秒為法乘之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分得數此數常加之加入合朔時東西差共得為東西定差也求南北定差法曰置前求到合朔時南北差通秒為實以求到比敷分亦通秒為法乘之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分得數此數常加之加入合朔時南北差共得為南北定差也求食甚定時法曰視其日合朔時太陽度在左七宮其時差黑字者減白字者加在右七宮白字者減黑字者加皆加減子正至合朔時得數命起子正減之如午後合朔者内減十二時命其午正減之得某時初正餘數以六十通之為秒以一千乘之以一百四十四除之以六十約之滿百為刻得若干刻幾十幾秒也即食甚定時求食甚時太陰經度法曰置合朔時太陽度内加減東西定差其加減依求食甚定時術視時差白黑字加減之即為食甚時太陰經度也求合朔時計都度法曰置前求到食甚泛時通分寄左以計都日行度三分一十一秒係立成内一日下計都度通秒得一百九十一秒以乘寄左得數以二十四除之得數為㣲滿六十約之為秒又以六十約之為分用加減其日午時計都度午時前合朔加午時後合朔减共得為合朔時計度宮度分也求合朔時太陰緯度法曰置前求到食甚時太陰經度内減合朔時計都度餘為計都與月相離度依術入太陰緯度立成内求之得黃道南北度分為合朔時太陰緯度也求食甚太陰緯度法曰置南北定差内加減合朔時太陰緯度視合朔時太陰緯度在黃道南加在黃道北減皆與南北定差相加減之得為食甚太陰緯度也求合朔時太陽自行度法曰置太陽中行度五十九分八秒即立成内一日下太陽日中行度通秒得三千五百四十八秒以食甚泛時通分乘之以二十四除之得數為㣲滿六十約之為秒又以六十約之為分得數用加減其日午正自行度午前合朔減午後合朔加即為合朔時太陽自行度也求太陽徑分法曰視合朔時太陽自行度其宮度入影徑分立成内同宮近度者横取太陽徑分為未定徑分寄左又取次一行太陽徑分與寄左相減為法又置合朔時太陽自行度内減立成内自行同宮近度餘通秒為實以法乘之以六度除之得數為纖滿六十約之為㣲又以六十約之為秒用加減横取到未定徑分如次一行太陽徑分少者減之多者加之即為太陽徑分也求太陰徑分法曰視合朔時本輪行度入影徑分立成同宮近度者内横取太陰徑分為未定徑分寄左又取次一行太陰徑分與寄左相減為法又置合朔時本輪行度内減立成内同宮近度本輪行度餘通分得為實以法乘之以六度除之得數為㣲滿六十約之為秒用加減橫取到未定徑分如次一行徑分多者加之少者減之共得為太陰徑分也求二徑折半分法曰置太陽徑分併入太陰徑分共得數半之得為二徑折半分也求太陽食限分法曰置二徑折半分内減食甚太陰緯度如不及減者不食餘為太陽食限分也求太陽食甚定分法曰置太陽食限分通秒以一千乘之為實以太陽徑分通秒為法除實得數以百約之為分得為太陽食甚定分也求時差法曰置食甚太陰緯度通秒自乘之得數寄左又置二徑折半分亦通秒自乘之得數内減寄左餘數以平方開之得數以二十四乘之為實以其日太陰日行度内減太陽日行度餘通分為法實如法而一得數為分如滿六十分約為一時即為所求時差也求初虧時刻法曰置食甚定時内減時差餘時命起子正減之得初正時餘分通秒以一千乘之得以一百四十四除之以六十約之滿百為刻即初虧時刻秒也求復圓時刻法曰置食甚定時内加時差命起子正減之得初正時餘分通秒以一千乘之得以一百四十四除之以六十約之滿百為刻得即復圓時刻也求初虧食甚復圓方位法曰視太陽若食既或食八分九分者初虧在正西食甚在正南復圓在正東若食八分已下者却視食甚太陰緯度在黃道北者初虧西北食甚正北復圓東北在黃道南初虧西南食甚正南復圓東南又曰置二徑折半分内減食甚太陰緯度餘視與太陽徑分同者食十分若多如太陽徑分者食十分已上即食既也食甚太陰無緯度太陰徑分與太陽徑分同者全食黑了若太陰徑多如太陽徑者食既也若太陰徑分少如太陽徑分者其食有金環推月食法推月食用數太陽日中行度太陽自行度太陽行度太陰經度本輪行度計都度太陽日行度太陰日行度求食甚泛時視其日午前望用前一日諸數推之午後望用次日諸數推之法曰置其日太陰經度内減六宮如不及減者加十二宮減之得數減其日太陽度為午前望如不及減者置其日太陽度加入六宮内減其日太陰經度為午後望置相減餘數通秒以二十四乘之為實置其日太陰經度内減前一日太陰經度若在午後望者去減後一日太陰經度也餘為太陰日行度也又置其日午正太陽度内減前一日午正太陽度若在午後望者去減後一日太陽度也餘為太陽日行度去減太陰日行度餘通秒為法除實得數為時其時下餘數以六十通之為分分下餘數又以六十通之為秒即為所求食甚泛時也求食甚月離黃道宮度分法曰置食甚泛時通秒寄左又置求到太陽日行度通秒以乘寄左以二十四除之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分得數為加減分去加減其日午正太陽度午前望減午後望加餘為望時太陽度内加六宮得數即為所求食甚月離黃道宮度分也求晝夜加減差法曰視求到望時太陽度其宮度入晝夜加減立成内宮度下兩取之得數為未定加減分又本行加減分與後行加減分相減以乘望時太陽度下小餘通秒得數為纖滿六十約之為㣲又以六十約之為秒去加減兩取到未定加減分如加減分多如後行者減之少如後行者加之餘為所求晝夜加減差也求食甚定時法曰置求到食甚泛時内加減晝夜加減差午前望減午後望加餘數去加減一十二時即為食甚定時如在午後望者内加一十二時命起子正減之如在午前望者去減十二時命起子正減之得初正時其小餘通秒以一千乘之如一百四十四而一得數滿六十約之為秒得數以百約之為刻得幾刻幾十幾秒即食甚定時也求望時計都度法曰置求到食甚泛時通秒為實以立成内一日下計都中心行度三分一十一秒通秒乘之以二十四除之得數為纖滿六十約之為㣲又以六十約之為秒又以六十約之為分用加減其日午正計都度午前望加午後望減共得即為所求望時計都宮度也求望時太陰緯度法曰置求到食甚月離黃道宮度分内減望時計都度如不及減者加十二宮減之餘為計都與月相離度依太陰緯度術求之得黃道南北初度分秒即為所求望時太陰緯度也求望時本輪行度法曰置立成内一日下太陰本輪行度一十三度四分通分以前求到食甚泛時通秒乘之以二十四除之得數為㣲滿六十約之為秒又以六十約之為分又滿六十約之為度得數用加減其日午正本輪行度午前望減午後望加餘即為所求望時本輪行度也求太陰影徑分法曰視求到望時本輪行度其宮度入影徑分立成宮度下横取太陰影徑分為未定影徑分又置影徑分本行與後行相減餘寄左置望時本輪行度内減立成内同宮近度餘通分與寄左相乘得數為㣲以六度除之滿六十約之為秒用加減取到未定影徑分如影徑分少如次行者加之多如次行者減之即為所求太陰影徑分也求太陰徑分法曰視求到望時本輪行度其宮度入影徑立成下横取太陰徑分為未定徑分又置徑分本行與後行相減餘寄左置望時本輪行度内減立成内同宮近度餘通分與寄左相乘得數為㣲以六度除之滿六十約之為秒用加減取到未定徑分如太陰徑分少如次行者加之多如次行者减之即為所求太陰徑分也求望時太陽自行度法曰置立成内一日下太陽中心行度五十九分八秒通秒以食甚泛時通秒乘之以二十四除之得數為纖以六十約之為㣲又以六十約之為秒又以六十約之為分用加減其日午正太陽自行度午前望減午後望加餘即為所求望時太陽自行度也求太陰影徑減差法曰視求到望時太陽自行度其宮度入影徑立成内宮度下横取太陰影徑減差為未定差又置影徑減差本行與次行相減餘寄左置望時太陽自行度内減立成内同宮近度餘通分與寄左相乘以六度除之得數為㣲以六十約之為秒用加減取到未定差如影徑減差少如次行者加之多如次行者減之得為太陰影徑減差也求太陰影徑定分法曰置求到太陰影徑分内減影徑減差餘即為影徑定分也求二徑折半分法曰置求到太陰徑分内加影徑定分得數半之得即為所求二徑折半分也求太陰食限分法曰置求到二徑折半分内減求到望時太陰緯度餘即為所求太陰食限分也如不及減者則不食求食甚定分法曰置求到太陰食限分通秒以一千乘之得為實置太陰徑分通秒為法除實得數以百約之得數即為所求太陰食甚定分也求太陰逐時行過太陽分法曰置太陰望日經度内減前一日太陰經度餘數寄左置望日太陽度内減前一日太陽度餘數用減寄左得為太陰晝夜行過太陽度通秒以二十四除之滿六十約之得即為所求太陰逐時行過太陽分也求時差即初虧至食甚也法曰置求到望時太陰緯度通秒自乘之得寄左又置二徑折半分亦通秒自乘之得數内減寄左餘為積平方開之得為實以太陰逐時行過太陽分通秒為法除實得為時差其時下小餘以六十通之為分分下小餘以六十通之為秒即為所求時差也求初虧時刻午後望者食甚定時内減十二時用初虧食既生光復圓同法曰置求到食甚定時内減時差餘命起子正減之如午後望命起午正減之得初正時其小餘通秒以一千乘之得以一百四十四除之得滿六十約之得數百約為刻得幾刻幾十幾秒也求復圓時刻法曰置求到食甚定時内加時差得數命起子正減之如午後望命起午正得初正時依前求刻法約之即得刻秒也求食既食甚加減差法曰置二徑折半分内減太陰徑分餘通秒自乘之得數寄左又置望時太陰緯度亦通秒自乘之去減寄左餘以平方開之得數為實以太陰逐時行過太陽度通秒為法除實得數以六十通之為分其分下小餘以六十通之為秒即為所求食既至食甚加減時差也求食既生光時刻法曰置食甚定時内減食既至食甚加減時差為食既時又置食甚定時内加食既至食甚加減時差為生光時其時之初正并刻秒並依初虧時刻法求之是也求初虧食甚復圓方位法曰視月食若食既者初虧正東復圓正西若不食既者視望時太陰緯度在黃道南者初虧東北食甚正北復圓西北如太陰緯度在黃道北者初虧東南食甚正南復圓西南相乘定數度乘分得分度乘㣲得㣲度乘秒得秒分乘分得秒分乘秒得㣲秒乘秒得纖分乘㣲得纖相除定數度除分滿法得分度除㣲滿法得㣲度除秒滿法得秒分除分滿法得度秒除秒滿法得度推日月出入帶食法求日出入時法曰視其日午正太陽經度入西域晝夜時立成内宮内度下兩取之得數為未定分其未定分本行與後行相減餘通分為法又置太陽經度分已下小餘通秒為實以法乘之得數為㣲以六十約之為秒又以六十約之為分加入兩取未定分得數寄左又視其日午正太陽經度相對宮度内兩取之如太陽在初宮三度却於六宮三度内取之他倣此得數為後取未定分其後取未定分本行與後行相減餘通分為法又置太陽經度分已下小餘通秒為實以法乘之得數為㣲以六十約之為秒又以六十約之為分加入後取未定分得數内減寄左如不及減者加三百六十度減之餘數通秒以十五除之滿六十約之為分又滿六十約之為時得其日晝時分秒折半之為其日半晝時分秒置十二時内減半晝時分秒餘為日出時分秒又置十二時内加半晝時分秒共為日入時分秒即得所求求日月出入帶食所見分秒法曰視其日日出時分秒并日入時分秒多如初虧時分秒少如食甚定時及復圓時分秒者即有帶食也置其日日出時或日入時分秒與食甚定時分秒相減餘為帶食差置日月食甚定分以帶食差通秒乘之以時差通秒除之得數為帶食分置食甚定分内減帶食分餘為日月帶食所見之分也求月食更㸃法曰置其日晝時内加七十二分為晨昏時折半之為半晨昏時置二十四時内減晨昏時餘為月食之日夜時通秒以五約之為更法又五約更法為㸃法如食在子正以前者置各初虧食甚復圓等時分秒内減十二時又減半晨昏時分秒餘通秒以更法除之為更數不滿法者以㸃法除之為㸃數皆命起初更初㸃算外為各更㸃也如食在子正以後者置月食之日夜時分秒内減初虧食甚復圓等時分秒餘通秒以更法除之為更數不滿法者以㸃法除之為㸃數皆命初更初㸃算外為各更㸃也此書上古未嘗有也洪武十八年遠夷歸化獻土盤厯法預推六曜干犯名曰經緯度時厯官元統去土盤譯為漢算而書始行乎中國歲久湮没予任監佐每慮廢弛而失眞傳成化六年具奏修補欽蒙准理又八年矣而無成今成化十三年秋而書始備命工鋟梓傳之監臺以報聖恩以益後學推厯君子宜敬謹焉七政推步卷一
