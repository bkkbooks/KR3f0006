body:
  text: 七政推步卷七明貝琳編太陰凌犯時刻立成凌犯入宿圖推月與五星入宿法法曰置各宿初界宫度分其月入宿緯度并時刻並依太隂凌犯求緯度時刻法推之其五星入宿者視各宿初界宫度與五星午正經度相近者取之是也晝夜加減差立成推算交食用太陽太陰晝夜時行影徑分立成推算交食用經緯時加減差立成推算交食用西域晝夜時立成七政推步巻七
  hash: sha256:20118ae859c8eff9bd0f991ea5a82c641a86dca366bd9a055ba0623e2b747871
