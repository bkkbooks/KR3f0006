body:
  text: 七政推步天文算法類一推歩之屬提要臣等謹案七政推步七卷明南京欽天監監副貝琳修輯即焦竑國史經籍志所載瑪沙伊赫原作馬沙亦黒今改正之回囘厯也考明史厯志囘囘厯法乃西域黙徳訥原作黙狄納今改正國王瑪哈穆特原作馬哈麻今改正所作元時入中國而未行洪武初得其書于元都十五年命翰林李翀吳伯宗同囘囘大師瑪沙伊赫等譯其書遂設回囘厯科𨽻欽天監而貝琳自跋又稱洪武十八年逺夷歸化獻土盤法預推六曜干犯名曰經緯度時厯官元統去土盤譯為漢算而書始行于中國與史所載頗不合按書中有西域歲前積年至洪武甲子嵗積若干算之語甲子為洪武十七年其時書已譯行則琳之説非也其書首釋用數次日躔次月離次五星求法並太隂出入時刻凌化五星恒星度分末載日食月食算術餘皆立成表其法以隋開皇己未嵗為厯元不用閏月以白羊金牛等十二宫為不動之月以一至十二大小月為動月各有閠日所推交食之分寸晷刻雖亦時有出入而在西域術中視九執萬年二厯實為精宻梅文鼎勿菴厯算書記曰囘囘厯刻于貝琳其布立成以太隂年而取距算以太陽年巧藏根數雖其子孫𨽻䑓官者弗能知然囘厯即西化之舊率㤗西本囘厯而加精耳亦公論也明一代皆與大統厯參用明史頗述其立法大畧然此為原書更稱詳晰惟其法本以土盤布算用本國之書明初譯漢之後傳習頗寡故無所校讎訛脱尤甚今以兩本互校著之于録用存術家之一種而補明史所未備焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
